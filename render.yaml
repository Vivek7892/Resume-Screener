databases:
  - name: resume-screener-db
    databaseName: resume_screener
    user: resume_user
    plan: free

services:
  # ── Backend (FastAPI) ─────────────────────────────
  - type: web
    name: resumerank-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    pythonVersion: 3.11.9
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-screener-db
          property: connectionString

      - key: ALLOWED_ORIGINS
        value: https://resume-screener-1-l538.onrender.com

  # ── Frontend (Next.js) ────────────────────────────
  - type: web
    name: resumerank-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free

    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://resume-screener-0r19.onrender.com
